<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baz Sport</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

  <!-- React and Babel for JSX in the browser -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Supabase Client Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>

<body class="bg-gray-900">
  <div id="root"></div>

  <script type="text/babel">
    // --- SUPABASE CONFIGURATION ---
    const supabaseUrl = 'https://mjexxadrukjwegvasqpo.supabase.co';
    const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qZXh4YWRydWtqd2VndmFzcXBvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDgxMDE5ODUsImV4cCI6MjA2MzY3Nzk4NX0.0oDaJzFouYrTubt6Anzs8xwoGRuaNEIrZyFr8CDTOrE';

    // --- INITIALIZE SUPABASE ---
    const { createClient } = supabase;
    const supabaseClient = createClient(supabaseUrl, supabaseAnonKey);

    // --- ADMIN ROLE ---
    const ADMIN_ROLE = 'admin';


    // --- SVG ICONS ---
    const ShoppingCartIcon = (props) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
    );
    const UserIcon = (props) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    );
    const TrashIcon = (props) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
    );
    const TruckIcon = (props) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>
    );
    const CheckCircleIcon = (props) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
    );
    const ArrowLeftIcon = (props) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    );
    const EditIcon = (props) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
    );
    const PlusCircleIcon = (props) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
    );
    const StarIcon = ({ className, ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
    );
    const SearchIcon = (props) => (
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    );

    // --- MODAL COMPONENT ---
    const Modal = ({ isOpen, onClose, onConfirm, title, children }) => {
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 bg-black bg-opacity-75 flex justify-center items-center z-50">
          <div className="bg-gray-800 rounded-lg p-8 max-w-sm w-full">
            <h2 className="text-xl font-bold mb-4">{title}</h2>
            <p className="text-gray-300 mb-6">{children}</p>
            <div className="flex justify-end space-x-4">
              <button onClick={onClose} className="px-4 py-2 rounded bg-gray-600 hover:bg-gray-500">Cancel</button>
              <button onClick={onConfirm} className="px-4 py-2 rounded bg-red-600 hover:bg-red-500">Confirm</button>
            </div>
          </div>
        </div>
      );
    };


    // --- COMPONENTS ---
    const Header = ({ setPage, cartCount, setSelectedProduct, user, handleLogout, onSearch }) => {
      const [searchTerm, setSearchTerm] = React.useState('');
      const [isDropdownOpen, setIsDropdownOpen] = React.useState(false);
      const dropdownRef = React.useRef(null);

      React.useEffect(() => {
        const handleClickOutside = (event) => {
          if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
            setIsDropdownOpen(false);
          }
        };
        document.addEventListener("mousedown", handleClickOutside);
        return () => {
          document.removeEventListener("mousedown", handleClickOutside);
        };
      }, [dropdownRef]);

      const goHome = () => {
        setSelectedProduct(null);
        setPage('home');
        onSearch('');
        setSearchTerm('');
      }
      const isAdmin = user && user.role === ADMIN_ROLE;

      const handleSearch = (e) => {
        e.preventDefault();
        onSearch(searchTerm);
        setPage('products');
      }

      const handleDropdownAction = (page) => {
        setPage(page);
        setIsDropdownOpen(false);
      };

      const handleLogoutClick = () => {
        handleLogout();
        setIsDropdownOpen(false);
      };

      return (
        <header className="bg-gray-900/80 text-white shadow-lg sticky top-0 z-50 backdrop-blur-sm">
          <div className="container mx-auto px-6 py-4 flex justify-between items-center">
            <div className="flex items-center space-x-3 cursor-pointer" onClick={goHome}>
              <img src="https://i.imgur.com/8goI41e.png" alt="Baz Sport Logo" className="h-12 w-12" />
            </div>
            <div className="flex-1 max-w-xl mx-4">
              <form onSubmit={handleSearch} className="relative">
                <input
                  type="text"
                  placeholder="Search products..."
                  value={searchTerm}
                  onChange={(e) => setSearchTerm(e.target.value)}
                  className="w-full bg-gray-700 text-white rounded-full py-2 px-4 focus:outline-none focus:ring-2 focus:ring-teal-500"
                />
                <button type="submit" className="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white">
                  <SearchIcon className="w-5 h-5" />
                </button>
              </form>
            </div>
            <nav className="hidden lg:flex items-center space-x-8">
              <a href="#" className="hover:text-teal-400" onClick={goHome}>Home</a>
              <a href="#" className="hover:text-teal-400" onClick={() => { setSelectedProduct(null); setPage('products'); onSearch(''); setSearchTerm(''); }}>Products</a>
              <a href="#" className="hover:text-teal-400" onClick={() => setPage('offers')}>Offers</a>
            </nav>
            <div className="flex items-center space-x-4 ml-4">
              {user ? (
                <div className="relative" ref={dropdownRef}>
                  <button onClick={() => setIsDropdownOpen(prev => !prev)} className="flex items-center space-x-2">
                    <UserIcon />
                  </button>
                  {isDropdownOpen && (
                    <div className="absolute right-0 mt-2 py-2 w-48 bg-gray-800 rounded-md shadow-xl z-50">
                      <a href="#" onClick={() => handleDropdownAction('profile')} className="block px-4 py-2 text-sm text-gray-300 hover:bg-teal-500 hover:text-white">Profile</a>
                      {isAdmin && <a href="#" onClick={() => handleDropdownAction('admin')} className="block px-4 py-2 text-sm text-teal-400 hover:bg-teal-500 hover:text-white">Admin Dashboard</a>}
                      <a href="#" onClick={handleLogoutClick} className="block px-4 py-2 text-sm text-gray-300 hover:bg-teal-500 hover:text-white">Logout</a>
                    </div>
                  )}
                </div>
              ) : (
                <button onClick={() => setPage('login')} className="flex items-center space-x-2 hover:text-teal-400">
                  <UserIcon />
                </button>
              )}

              <button className="relative" onClick={() => setPage('cart')}>
                <ShoppingCartIcon className="h-6 w-6 hover:text-teal-400" />
                {cartCount > 0 && (
                  <span className="absolute -top-2 -right-2 bg-red-600 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">
                    {cartCount}
                  </span>
                )}
              </button>
            </div>
          </div>
        </header>
      );
    };

    const ProductCard = ({ product, setSelectedProduct, addToCart }) => {
      const isOutOfStock = product.stock <= 0;
      const handleProductClick = () => {
        if (!isOutOfStock) setSelectedProduct(product.id);
      }
      const handleAddToCart = (e) => {
        e.stopPropagation();
        const defaultSize = product.sizes && product.sizes.length > 0 ? product.sizes[0] : 'One Size';
        addToCart(product, 1, defaultSize);
        const button = e.currentTarget;
        button.textContent = 'Added!';
        button.classList.add('bg-green-500');
        setTimeout(() => {
          button.textContent = 'Add to Cart';
          button.classList.remove('bg-green-500');
        }, 1500);
      }

      return (
        <div className={`bg-gray-800 rounded-lg shadow-xl overflow-hidden group transform hover:-translate-y-2 transition-transform duration-300 flex flex-col ${isOutOfStock ? 'opacity-60' : 'cursor-pointer'}`} onClick={handleProductClick}>
          <div className="relative h-64 w-full">
            <img src={product.image} alt={product.name} className="w-full h-full object-cover" onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.co/600x600/2d3748/e2e8f0?text=Image+Not+Found' }} />
            {product.offer_price && (
              <div className="absolute top-2 right-2 bg-red-600 text-white text-xs font-bold px-2 py-1 rounded">SALE</div>
            )}
            {isOutOfStock && (
              <div className="absolute inset-0 bg-black/50 flex items-center justify-center">
                <span className="text-white font-bold text-lg">Out of Stock</span>
              </div>
            )}
          </div>
          <div className="p-4 flex flex-col flex-grow">
            <p className="text-sm text-gray-400 mb-1">{product.category}</p>
            <h3 className="text-lg font-semibold truncate flex-grow">{product.name}</h3>
            {product.offer_price ? (
              <div className="mt-1">
                <span className="text-red-500 font-bold text-xl">{(product.offer_price || 0).toFixed(2)} EGP</span>
                <span className="text-gray-500 line-through ml-2">{(product.selling_price || 0).toFixed(2)} EGP</span>
              </div>
            ) : (
              <p className="text-teal-400 font-bold mt-1">{(product.selling_price || 0).toFixed(2)} EGP</p>
            )}
            <button
              className={`w-full mt-4 text-white font-bold py-2 px-4 rounded-lg transition-colors duration-300 ${isOutOfStock ? 'bg-gray-600 cursor-not-allowed' : 'bg-teal-500 hover:bg-teal-600'}`}
              onClick={handleAddToCart}
              disabled={isOutOfStock}
            >
              {isOutOfStock ? 'Out of Stock' : 'Add to Cart'}
            </button>
          </div>
        </div>
      );
    };

    const StarRating = ({ rating, onRating, readOnly = false }) => {
      return (
        <div className="flex space-x-1">
          {[1, 2, 3, 4, 5].map((star) => (
            <StarIcon
              key={star}
              className={`w-6 h-6 ${readOnly ? '' : 'cursor-pointer'} ${rating >= star ? 'text-yellow-400' : 'text-gray-600'
                } ${!readOnly && 'hover:text-yellow-300'}`}
              onClick={() => !readOnly && onRating(star)}
            />
          ))}
        </div>
      );
    };


    const ProductDetailPage = ({ product, setSelectedProduct, addToCart, user, setPage }) => {
      const [quantity, setQuantity] = React.useState(1);
      const [selectedSize, setSelectedSize] = React.useState(product && product.sizes && product.sizes.length > 0 ? product.sizes[0] : 'One Size');
      const [added, setAdded] = React.useState(false);
      const [reviews, setReviews] = React.useState([]);
      const [userRating, setUserRating] = React.useState(0);
      const [reviewText, setReviewText] = React.useState('');
      const [isSubmitting, setIsSubmitting] = React.useState(false);

      React.useEffect(() => {
        const fetchReviews = async () => {
          if (!product || !product.id) return;
          const { data, error } = await supabaseClient
            .from('reviews')
            .select('*, profiles(email)')
            .eq('product_id', product.id)
            .order('created_at', { ascending: false });

          if (error) console.error("Error fetching reviews:", error);
          else setReviews(data);
        }
        fetchReviews();
      }, [product]);

      if (!product) {
        return <div className="text-center py-20 text-xl">Loading Product...</div>;
      }

      const isOutOfStock = product.stock <= 0;

      const handleAddToCart = () => {
        addToCart(product, quantity, selectedSize);
        setAdded(true);
        setTimeout(() => setAdded(false), 2000);
      }

      const handleReviewSubmit = async (e) => {
        e.preventDefault();
        if (!userRating || !reviewText) {
          alert("Please provide a rating and a review text.");
          return;
        }
        setIsSubmitting(true);
        try {
          const { data, error } = await supabaseClient
            .from('reviews')
            .insert([{
              product_id: product.id,
              user_id: user.id,
              rating: userRating,
              text: reviewText,
            }])
            .select('*, profiles(email)');

          if (error) throw error;
          setReviews(prev => [data[0], ...prev]);
          setReviewText('');
          setUserRating(0);
        } catch (error) {
          console.error("Error submitting review: ", error);
          alert("Failed to submit review.");
        }
        setIsSubmitting(false);
      }

      const avgRating = reviews.length > 0 ? reviews.reduce((acc, r) => acc + r.rating, 0) / reviews.length : 0;

      return (
        <div className="container mx-auto px-6 py-12">
          <button onClick={() => setSelectedProduct(null)} className="flex items-center space-x-2 mb-8 text-gray-400 hover:text-white">
            <ArrowLeftIcon />
            <span>Back to products</span>
          </button>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-12 items-start">
            <div className="bg-gray-800 rounded-lg shadow-xl p-4">
              <img src={product.image} alt={product.name} className="w-full h-auto object-contain rounded-lg max-h-[500px]" onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.co/600x600/2d3748/e2e8f0?text=Image+Not+Found' }} />
            </div>
            <div>
              <h1 className="text-4xl font-bold mb-2">{product.name}</h1>
              <div className="flex items-center gap-2 mb-4">
                <StarRating rating={avgRating} readOnly={true} />
                <span className="text-gray-400">({reviews.length} reviews)</span>
              </div>
              {product.offer_price ? (
                <div className="mb-6">
                  <span className="text-red-500 font-bold text-3xl">{(product.offer_price || 0).toFixed(2)} EGP</span>
                  <span className="text-gray-500 line-through ml-3 text-xl">{(product.selling_price || 0).toFixed(2)} EGP</span>
                </div>
              ) : (
                <p className="text-3xl text-teal-400 font-bold mb-6">{(product.selling_price || 0).toFixed(2)} EGP</p>
              )}
              <p className="text-gray-300 mb-6">{product.description || "No description available."}</p>

              <div className="mb-6">
                <h3 className="text-lg font-semibold mb-2">Size</h3>
                <div className="flex space-x-2">
                  {product.sizes && product.sizes.length > 0 ? product.sizes.map(size => (
                    <button key={size} onClick={() => setSelectedSize(size)} className={`px-4 py-2 rounded-lg border-2 ${selectedSize === size ? 'bg-teal-500 border-teal-500' : 'border-gray-600 hover:bg-gray-700'}`}>
                      {size}
                    </button>
                  )) : <span className="text-gray-400">One Size</span>}
                </div>
              </div>

              <div className="mb-6">
                <h3 className="text-lg font-semibold mb-2">Quantity</h3>
                <div className="flex items-center space-x-4">
                  <button onClick={() => setQuantity(q => Math.max(1, q - 1))} className="bg-gray-700 px-3 py-1 rounded-md">-</button>
                  <span>{quantity}</span>
                  <button onClick={() => setQuantity(q => q + 1)} className="bg-gray-700 px-3 py-1 rounded-md">+</button>
                </div>
              </div>

              <button
                onClick={handleAddToCart}
                className={`w-full py-3 rounded-lg font-bold transition-colors ${added ? 'bg-green-500' : 'bg-teal-500 hover:bg-teal-600'} ${isOutOfStock ? 'bg-gray-600 cursor-not-allowed' : ''}`}
                disabled={isOutOfStock}
              >
                {isOutOfStock ? 'Out of Stock' : (added ? 'Added to Cart!' : 'Add to Cart')}
              </button>
            </div>
          </div>
          {/* Reviews Section */}
          <div className="mt-16">
            <h2 className="text-3xl font-bold mb-8">Customer Reviews</h2>
            {user ? (
              <form onSubmit={handleReviewSubmit} className="bg-gray-800 p-6 rounded-lg mb-8">
                <h3 className="text-xl font-semibold mb-4">Write a Review</h3>
                <div className="mb-4">
                  <StarRating rating={userRating} onRating={setUserRating} />
                </div>
                <textarea
                  value={reviewText}
                  onChange={(e) => setReviewText(e.target.value)}
                  placeholder="Share your thoughts..."
                  className="w-full bg-gray-700 p-3 rounded-md mb-4"
                  rows="4"
                ></textarea>
                <button type="submit" disabled={isSubmitting} className="bg-teal-500 hover:bg-teal-600 px-6 py-2 rounded-lg font-bold disabled:bg-gray-500">
                  {isSubmitting ? 'Submitting...' : 'Submit Review'}
                </button>
              </form>
            ) : (
              <p className="text-gray-400 mb-8">Please <button onClick={() => setPage('login')} className="font-semibold text-teal-400">log in</button> to write a review.</p>
            )}
            <div className="space-y-6">
              {reviews.length > 0 ? reviews.map(review => (
                <div key={review.id} className="bg-gray-800 p-4 rounded-lg">
                  <div className="flex items-center mb-2">
                    <StarRating rating={review.rating} readOnly={true} />
                    <p className="ml-4 font-bold">{review.profiles?.email || 'Anonymous'}</p>
                  </div>
                  <p className="text-gray-300">{review.text}</p>
                </div>
              )) : <p className="text-gray-400">No reviews yet.</p>}
            </div>
          </div>
        </div>
      );
    };

    const HomePage = ({ products, setPage, addToCart, setSelectedProduct }) => {
      const featuredProducts = products.slice(0, 4);
      return (
        <div>
          <div className="relative h-[60vh] flex items-center justify-center text-center bg-cover bg-center" style={{ backgroundImage: "url('https://images.unsplash.com/photo-1517649763962-0c623066013b?q=80&w=2070&auto=format&fit=crop')" }}>
            <div className="absolute inset-0 bg-black/60"></div>
            <div className="relative z-10 p-6">
              <h1 className="text-5xl md:text-7xl font-extrabold mb-4 tracking-tight">Unleash Your Potential</h1>
              <p className="text-xl md:text-2xl text-gray-200 mb-8 max-w-2xl mx-auto">High-performance gear for the modern athlete. Built to win.</p>
              <button onClick={() => setPage('products')} className="bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 px-8 rounded-lg text-lg transition-transform hover:scale-105">
                Shop Now
              </button>
            </div>
          </div>
          <div className="container mx-auto px-6 py-16">
            <h2 className="text-3xl font-bold text-center mb-10">Featured Products</h2>
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
              {featuredProducts.map(product => (
                <ProductCard key={product.id} product={product} addToCart={addToCart} setSelectedProduct={setSelectedProduct} />
              ))}
            </div>
          </div>
        </div>
      )
    }

    const ProductsPage = ({ products, isLoading, addToCart, categories, searchTerm, setSelectedProduct }) => {
      const [sortOrder, setSortOrder] = React.useState('latest');
      const [selectedCategory, setSelectedCategory] = React.useState('All');

      const filteredProducts = products
        .filter(p => selectedCategory === 'All' || p.category === selectedCategory)
        .filter(p => p.name.toLowerCase().includes(searchTerm.toLowerCase()));

      const sortedProducts = [...filteredProducts].sort((a, b) => {
        if (sortOrder === 'price-asc') {
          return (a.offer_price || a.selling_price) - (b.offer_price || b.selling_price);
        }
        if (sortOrder === 'price-desc') {
          return (b.offer_price || b.selling_price) - (a.offer_price || a.selling_price);
        }
        return new Date(b.created_at) - new Date(a.created_at);
      });

      return (
        <div className="container mx-auto px-6 py-12">
          <h1 className="text-4xl font-bold text-center mb-8">All Products</h1>
          <div className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div className="flex justify-center space-x-2 md:space-x-4 flex-wrap">
              <button onClick={() => setSelectedCategory('All')} className={`px-4 py-2 rounded-lg font-semibold ${selectedCategory === 'All' ? 'bg-teal-500 text-white' : 'bg-gray-700 text-gray-300 hover:bg-gray-600'}`}>All</button>
              {categories.map(category => (

    const ProductForm = ({ product, onSave, onCancel }) => {
      const [formData, setFormData] = React.useState(
        product || { name: '', description: '', category: '', selling_price: '', offer_price: '', image: '', sizes: [], stock: 0 }
      );
      const [imageFile, setImageFile] = React.useState(null);
      const [isUploading, setIsUploading] = React.useState(false);

      const handleChange = (e) => {
        const { name, value, type } = e.target;
        setFormData(prev => ({ ...prev, [name]: type === 'number' ? parseFloat(value) : value }));
      };

      const handleFileChange = (e) => {
        if (e.target.files[0]) {
          setImageFile(e.target.files[0]);
        }
      }

      const handleSubmit = async (e) => {
        e.preventDefault();
        setIsUploading(true);
        let imageUrl = formData.image;

        if (imageFile) {
          const filePath = `public/${Date.now()}_${imageFile.name}`;
          try {
            const { error: uploadError } = await supabaseClient.storage
              .from('product-images')
              .upload(filePath, imageFile);
            if (uploadError) throw uploadError;

            const { data } = supabaseClient.storage
              .from('product-images')
              .getPublicUrl(filePath);
            imageUrl = data.publicUrl;

          } catch (error) {
            console.error("Error uploading image: ", error);
            alert("Failed to upload image. Please try again.");
            setIsUploading(false);
            return;
          }
        }

        const dataToSave = {
          ...formData,
          image: imageUrl,
          selling_price: parseFloat(formData.selling_price) || 0,
          offer_price: formData.offer_price ? parseFloat(formData.offer_price) : null,
          sizes: Array.isArray(formData.sizes) ? formData.sizes : formData.sizes.split(',').map(s => s.trim()).filter(Boolean),
          stock: Number(formData.stock) || 0,
        };
        if (dataToSave.id) delete dataToSave.id;
        if (dataToSave.created_at) delete dataToSave.created_at;

        await onSave(dataToSave);
        setIsUploading(false);
      };

      return (
        <form onSubmit={handleSubmit} className="bg-gray-800 p-8 rounded-lg space-y-6 max-w-2xl mx-auto">
          <input name="name" value={formData.name} onChange={handleChange} placeholder="Product Name" required className="w-full bg-gray-700 p-3 rounded-md" />
          <textarea name="description" value={formData.description} onChange={handleChange} placeholder="Product Description" className="w-full bg-gray-700 p-3 rounded-md" rows="4" />
          <input name="category" value={formData.category} onChange={handleChange} placeholder="Category" required className="w-full bg-gray-700 p-3 rounded-md" />
          <input name="selling_price" value={formData.selling_price} onChange={handleChange} type="number" step="0.01" placeholder="Selling Price (EGP)" required className="w-full bg-gray-700 p-3 rounded-md" />
          <input name="offer_price" value={formData.offer_price || ''} onChange={handleChange} type="number" step="0.01" placeholder="Offer Price (EGP, optional)" className="w-full bg-gray-700 p-3 rounded-md" />
          <input name="stock" value={formData.stock} onChange={handleChange} type="number" placeholder="Stock Quantity" required className="w-full bg-gray-700 p-3 rounded-md" />
          <div>
            <label className="block text-sm font-medium text-gray-300 mb-2">Product Image</label>
            <input type="file" onChange={handleFileChange} className="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-teal-50 file:text-teal-700 hover:file:bg-teal-100" />
            {formData.image && !imageFile && <img src={formData.image} alt="Current" className="w-24 h-24 object-cover mt-4 rounded-md" />}
          </div>
          <input name="sizes" value={Array.isArray(formData.sizes) ? formData.sizes.join(', ') : formData.sizes} onChange={handleChange} placeholder="Sizes (comma-separated, e.g., S, M, L)" className="w-full bg-gray-700 p-3 rounded-md" />
          <div className="flex space-x-4">
            <button type="submit" disabled={isUploading} className="w-full bg-teal-500 hover:bg-teal-600 py-2 rounded-md font-bold disabled:bg-gray-500">
              {isUploading ? 'Saving...' : 'Save Product'}
            </button>
            <button type="button" onClick={onCancel} className="w-full bg-gray-600 hover:bg-gray-500 py-2 rounded-md font-bold">Cancel</button>
          </div>
        </form>
      );
    }

    const AdminProductsPage = ({ products, setPage, onProductAdd, onProductUpdate, onProductDelete }) => {
      const [isEditing, setIsEditing] = React.useState(null);
      const [modalState, setModalState] = React.useState({ isOpen: false, productId: null });

      const openDeleteModal = (productId) => {
        setModalState({ isOpen: true, productId: productId });
      }

      const closeDeleteModal = () => {
        setModalState({ isOpen: false, productId: null });
      }

      const confirmDelete = () => {
        if (modalState.productId) {
          onProductDelete(modalState.productId);
        }
        closeDeleteModal();
      }

      const handleSave = (productData) => {
        if (isEditing && isEditing.id) {
          onProductUpdate(isEditing.id, productData);
        } else {
          onProductAdd(productData);
        }
        setIsEditing(null);
      }

      return (
        <div className="container mx-auto px-6 py-12">
          <Modal
            isOpen={modalState.isOpen}
            onClose={closeDeleteModal}
            onConfirm={confirmDelete}
            title="Delete Product"
          >
            Are you sure you want to permanently delete this product? This action cannot be undone.
          </Modal>
          <button onClick={() => setPage('admin')} className="flex items-center space-x-2 mb-8 text-gray-400 hover:text-white">
            <ArrowLeftIcon />
            <span>Back to Admin</span>
          </button>
          <div className="flex justify-between items-center mb-8">
            <h1 className="text-3xl font-bold">Manage Products</h1>
            <button onClick={() => setIsEditing({})} className="bg-teal-500 hover:bg-teal-600 flex items-center space-x-2 px-4 py-2 rounded-lg">
              <PlusCircleIcon />
              <span>Add Product</span>
            </button>
          </div>

          {isEditing !== null && (
            <div className="mb-12">
              <ProductForm product={isEditing} onSave={handleSave} onCancel={() => setIsEditing(null)} />
            </div>
          )}

          <div className="bg-gray-800 rounded-lg shadow-xl overflow-x-auto">
            <table className="w-full text-left">
              <thead className="bg-gray-700">
                <tr>
                  <th className="p-4">Name</th>
                  <th className="p-4">Category</th>
                  <th className="p-4">Price</th>
                  <th className="p-4">Stock</th>
                  <th className="p-4">Actions</th>
                </tr>
              </thead>
              <tbody>
                {products.map(product => (
                  <tr key={product.id} className="border-b border-gray-700">
                    <td className="p-4">{product.name}</td>
                    <td className="p-4">{product.category}</td>
                    <td className="p-4">{(product.selling_price || 0).toFixed(2)} EGP</td>
                    <td className="p-4">{product.stock || 0}</td>
                    <td className="p-4 flex space-x-4">
                      <button onClick={() => setIsEditing(product)}><EditIcon className="w-5 h-5 hover:text-teal-400" /></button>
                      <button onClick={() => openDeleteModal(product.id)}><TrashIcon className="w-5 h-5 hover:text-red-500" /></button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    const AdminOrdersPage = ({ setPage }) => {
      const [orders, setOrders] = React.useState([]);
      const [isLoading, setIsLoading] = React.useState(true);

      React.useEffect(() => {
        const fetchOrders = async () => {
          try {
            const { data, error } = await supabaseClient
              .from('orders')
              .select('*')
              .order('created_at', { ascending: false });

            if (error) throw error;
            setOrders(data);
          } catch (error) {
            console.error("Error fetching all orders:", error);
          } finally {
            setIsLoading(false);
          }
        };
        fetchOrders();
      }, []);

      const handleStatusUpdate = async (orderId, newStatus) => {
        try {
          const { error } = await supabaseClient
            .from('orders')
            .update({ status: newStatus })
            .eq('id', orderId);

          if (error) throw error;

          setOrders(prevOrders =>
            prevOrders.map(order => order.id === orderId ? { ...order, status: newStatus } : order)
          );
        } catch (error) {
          console.error("Error updating order status:", error);
          alert('Failed to update status.');
        }
      };

      if (isLoading) return <div className="text-center py-20 text-xl">Loading all orders...</div>;

      return (
        <div className="container mx-auto px-6 py-12">
          <button onClick={() => setPage('admin')} className="flex items-center space-x-2 mb-8 text-gray-400 hover:text-white">
            <ArrowLeftIcon />
            <span>Back to Admin</span>
          </button>
          <h1 className="text-3xl font-bold mb-8">Manage Orders</h1>
          <div className="bg-gray-800 rounded-lg shadow-xl overflow-x-auto">
            <table className="w-full text-left">
              <thead className="bg-gray-700">
                <tr>
                  <th className="p-4">Customer</th>
                  <th className="p-4">Total</th>
                  <th className="p-4">Date</th>
                  <th className="p-4">Status</th>
                  <th className="p-4">Update Status</th>
                </tr>
              </thead>
              <tbody>
                {orders.map(order => (
                  <tr key={order.id} className="border-b border-gray-700">
                    <td className="p-4">{order.customer_details.name}<br /><span className="text-sm text-gray-400">{order.customer_details.phone}</span></td>
                    <td className="p-4">{order.total.toFixed(2)} EGP</td>
                    <td className="p-4 text-sm">{new Date(order.created_at).toLocaleDateString()}</td>
                    <td className="p-4"><span className={`px-2 py-1 text-xs font-semibold rounded-full ${order.status === 'Shipped' ? 'bg-blue-500/20 text-blue-400' : order.status === 'Delivered' ? 'bg-green-500/20 text-green-400' : 'bg-yellow-500/20 text-yellow-400'}`}>{order.status}</span></td>
                    <td className="p-4">
                      <select onChange={(e) => handleStatusUpdate(order.id, e.target.value)} value={order.status} className="bg-gray-700 border-gray-600 rounded-md p-2 focus:ring-teal-500 focus:border-teal-500">
                        <option>Pending</option>
                        <option>Shipped</option>
                        <option>Delivered</option>
                        <option>Cancelled</option>
                      </select>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    };

    const Footer = ({ setPage }) => {
      return (
        <footer className="bg-gray-800 text-gray-400 mt-16">
          <div className="container mx-auto px-6 py-8">
            <div className="text-center">
              <p>&copy; {new Date().getFullYear()} Baz Sport. All Rights Reserved.</p>
            </div>
          </div>
        </footer>
      );
    };

    function App() {
      const [page, setPage] = React.useState('home');
      const [user, setUser] = React.useState(null);
      const [authError, setAuthError] = React.useState(null);
      const [isAuthLoading, setIsAuthLoading] = React.useState(true);
      const [products, setProducts] = React.useState([]);
      const [isLoadingProducts, setIsLoadingProducts] = React.useState(true);
      const [dbError, setDbError] = React.useState(null);
      const [cart, setCart] = React.useState(() => {
        try {
          const localData = localStorage.getItem('baz-sport-cart-supabase');
          return localData ? JSON.parse(localData) : [];
        } catch (error) {
          return [];
        }
      });
      const [selectedProductId, setSelectedProduct] = React.useState(null);
      const [latestOrderId, setLatestOrderId] = React.useState(null);
      const [searchTerm, setSearchTerm] = React.useState('');
      const [categories, setCategories] = React.useState([]);

      // Authentication & Profile Fetching
      React.useEffect(() => {
        const fetchUserAndProfile = async () => {
          const { data: { session } } = await supabaseClient.auth.getSession();
          if (session) {
            const { data: profile } = await supabaseClient
              .from('profiles')
              .select(`*`)
              .eq('id', session.user.id)
              .single();
            setUser({ ...session.user, ...profile });
          }
          setIsAuthLoading(false);
        };
        fetchUserAndProfile();

        const { data: authListener } = supabaseClient.auth.onAuthStateChange(async (_event, session) => {
          if (session) {
            const { data: profile } = await supabaseClient
              .from('profiles')
              .select(`*`)
              .eq('id', session.user.id)
              .single();
            setUser({ ...session.user, ...profile });
          } else {
            setUser(null);
          }
          setIsAuthLoading(false);
        });

        return () => {
          if (authListener && authListener.subscription) {
            authListener.subscription.unsubscribe();
          }
        }
      }, []);

      // Fetch Products
      const fetchProducts = async () => {
        try {
          setIsLoadingProducts(true);
          setDbError(null);
          const { data, error } = await supabaseClient
            .from('products')
            .select('*')
            .order('created_at', { ascending: false });

          if (error) throw error;
          setProducts(data);
          const productCategories = [...new Set(data.map(p => p.category).filter(Boolean))];
          setCategories(productCategories);

        } catch (error) {
          if (error.message.includes("relation \"public.products\" does not exist")) {
            setDbError("Database not fully set up. Please run the complete SQL script from the setup guide.");
          } else {
            console.error("Error fetching products: ", error);
            setDbError("An unexpected error occurred while fetching products.");
          }
        } finally {
          setIsLoadingProducts(false);
        }
      };

      React.useEffect(() => {
        fetchProducts();
      }, []);

      // Persist cart to localStorage
      React.useEffect(() => {
        localStorage.setItem('baz-sport-cart-supabase', JSON.stringify(cart));
      }, [cart]);

      const handleSignUp = async (email, password) => {
        setAuthError(null);
        try {
          const { error } = await supabaseClient.auth.signUp({ email, password });
          if (error) throw error;
          setPage('home');
        } catch (error) {
          setAuthError(error.message);
        }
      };

      const handleLogin = async (email, password) => {
        setAuthError(null);
        try {
          const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
          if (error) throw error;
          setPage('home');
        } catch (error) {
          setAuthError(error.message);
        }
      };

      const handleLogout = async () => {
        try {
          await supabaseClient.auth.signOut();
          setPage('home');
        } catch (error) {
          console.error("Logout error:", error);
        }
      };

      const addToCart = (productToAdd, quantity, size) => {
        const productInDb = products.find(p => p.id === productToAdd.id);
        if (!productInDb || productInDb.stock < 1) {
          alert("This product is out of stock.");
          return;
        }

        setCart(prevCart => {
          const existingItem = prevCart.find(item => item.productId === productToAdd.id && item.size === size);
          const currentQuantityInCart = existingItem ? existingItem.quantity : 0;

          if (currentQuantityInCart + quantity > productInDb.stock) {
            alert(`Sorry, only ${productInDb.stock} of this item are available.`);
            return prevCart;
          }

          if (existingItem) {
            return prevCart.map(item =>
              item.cartItemId === existingItem.cartItemId
                ? { ...item, quantity: item.quantity + quantity }
                : item
            );
          } else {
            const newItem = {
              cartItemId: `${productToAdd.id}-${size}-${Date.now()}`,
              productId: productToAdd.id,
              name: productToAdd.name,
              price: productToAdd.offer_price || productToAdd.selling_price,
              size,
              quantity,
            };
            return [...prevCart, newItem];
          }
        });
      };

      const removeFromCart = (itemIdToRemove) => {
        setCart(prevCart => prevCart.filter(item => item.cartItemId !== itemIdToRemove));
      };

      const updateCartQuantity = (itemIdToUpdate, newQuantity) => {
        if (newQuantity < 1) {
          removeFromCart(itemIdToUpdate);
          return;
        }
        setCart(prevCart => prevCart.map(item =>
          item.cartItemId === itemIdToUpdate ? { ...item, quantity: newQuantity } : item
        ));
      };

      const placeOrder = async (customerDetails, total) => {
        if (!user) {
          setPage('login');
          return;
        }
        try {
          const { data, error } = await supabaseClient
            .from('orders')
            .insert([{
              user_id: user.id,
              customer_details: customerDetails,
              items: cart,
              total: total,
              status: 'Pending',
              payment_method: 'Cash on Delivery'
            }])
            .select('id')
            .single();

          if (error) throw error;

          // You would typically call an RPC function here to decrement stock
          setLatestOrderId(data.id);
          setCart([]);
          setPage('orderConfirmation');
          fetchProducts();
        } catch (error) {
          console.error("Order failed: ", error);
          alert("There was an error placing your order: " + error.message);
        }
      };

      // --- ADMIN CRUD Functions ---
      const handleAddProduct = async (productData) => {
        try {
          const { error } = await supabaseClient.from('products').insert([productData]);
          if (error) throw error;
          fetchProducts();
        } catch (error) {
          console.error("Error adding product: ", error);
          alert("Failed to add product.");
        }
      };
      const handleUpdateProduct = async (productId, productData) => {
        try {
          const { error } = await supabaseClient.from('products').update(productData).eq('id', productId);
          if (error) throw error;
          fetchProducts();
        } catch (error) {
          console.error("Error updating product: ", error);
          alert("Failed to update product.");
        }
      };
      const handleDeleteProduct = async (productId) => {
        try {
          const { error } = await supabaseClient.from('products').delete().eq('id', productId);
          if (error) throw error;
          fetchProducts();
        } catch (error) {
          console.error("Error deleting product: ", error);
          alert("Failed to delete product.");
        }
      };

      const renderPage = () => {
        if (isAuthLoading) return <div className="text-center py-20 text-xl h-screen flex items-center justify-center">Loading...</div>;

        if (dbError) {
          return (
            <div className="container mx-auto px-6 py-20 text-center">
              <h1 className="text-3xl font-bold text-red-500 mb-4">Database Setup Required</h1>
              <div className="mt-6 p-4 bg-gray-800 rounded-lg text-left max-w-2xl mx-auto">
                <p className="font-bold text-white mb-2">Error Details:</p>
                <code className="text-gray-300 bg-gray-700 p-2 rounded block">{dbError}</code>
                <p className="font-bold text-white mt-4">Next Step:</p>
                <p className="text-gray-400 mt-2">Please go to the "Final Setup Guide" and run the SQL script in your Supabase project.</p>
              </div>
            </div>
          );
        }

        if (selectedProductId) {
          const selectedProductData = products.find(p => p.id === selectedProductId);
          return <ProductDetailPage product={selectedProductData} setSelectedProduct={setSelectedProduct} addToCart={addToCart} user={user} setPage={setPage} />
        }

        switch (page) {
          case 'home':
            return <HomePage products={products} setPage={setPage} addToCart={addToCart} setSelectedProduct={setSelectedProduct} />;
          case 'products':
            return <ProductsPage products={products} isLoading={isLoadingProducts} addToCart={addToCart} setSelectedProduct={setSelectedProduct} categories={categories} searchTerm={searchTerm} />;
          case 'offers':
            return <OffersPage products={products} isLoading={isLoadingProducts} addToCart={addToCart} setSelectedProduct={setSelectedProduct} />;
          case 'cart':
            return <CartPage cart={cart} products={products} updateCartQuantity={updateCartQuantity} removeFromCart={removeFromCart} setPage={setPage} user={user} />;
          case 'checkout':
            if (!user) return <AuthForm isLogin={true} setPage={setPage} handleSubmit={handleLogin} error={authError} />;
            if (cart.length === 0) {
              setPage('products');
              return null;
            }
            return <CheckoutPage cart={cart} products={products} placeOrder={placeOrder} user={user} />;
          case 'orderConfirmation':
            return <OrderConfirmationPage orderId={latestOrderId} setPage={setPage} />;
          case 'login':
            return <AuthForm isLogin={true} setPage={setPage} handleSubmit={handleLogin} error={authError} />;
          case 'signup':
            return <AuthForm isLogin={false} setPage={setPage} handleSubmit={handleSignUp} error={authError} />;
          case 'profile':
            if (!user) return <AuthForm isLogin={true} setPage={setPage} handleSubmit={handleLogin} error={authError} />;
            return <ProfilePage user={user} handleLogout={handleLogout} setPage={setPage} />;
          case 'admin':
            if (!isAdmin) return <HomePage products={products} setPage={setPage} setSelectedProduct={setSelectedProduct} addToCart={addToCart} />;
            return <AdminDashboardPage setPage={setPage} />
          case 'admin-products':
            if (!isAdmin) return <HomePage products={products} setPage={setPage} setSelectedProduct={setSelectedProduct} addToCart={addToCart} />;
            return <AdminProductsPage products={products} setPage={setPage} onProductAdd={handleAddProduct} onProductUpdate={handleUpdateProduct} onProductDelete={handleDeleteProduct} />
          case 'admin-orders':
            if (!isAdmin) return <HomePage products={products} setPage={setPage} setSelectedProduct={setSelectedProduct} addToCart={addToCart} />;
            return <AdminOrdersPage setPage={setPage} />
          default:
            return <HomePage products={products} setPage={setPage} addToCart={addToCart} setSelectedProduct={setSelectedProduct} />;
        }
      }

      const showHeaderFooter = page !== 'login' && page !== 'signup';
      const isAdmin = user && user.role === ADMIN_ROLE;

      return (
        <div className="bg-gray-900 text-white min-h-screen font-sans flex flex-col">
          <Header setPage={setPage} user={user} handleLogout={handleLogout} cartCount={cart.reduce((sum, item) => sum + item.quantity, 0)} onSearch={setSearchTerm} setSelectedProduct={setSelectedProduct} />
          <main className="flex-grow">
            {renderPage()}
          </main>
          {showHeaderFooter && <Footer />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
